name: ML-extension bug report
description: Report a bug in this fork's ML extensions (`evallegal` UCI command or `NetSelection` UCI option).
body:
- type: markdown
  attributes:
    value: |
      ## Scope of this tracker

      This repo only carries two additive extensions on top of upstream
      Stockfish 18:

      - the `evallegal` UCI command
      - the `NetSelection` UCI option (`auto | small | large`)

      **Please only open an issue here if the bug is directly related to
      one of those two extensions.** Anything else — search behavior,
      eval quality, NNUE strength, vanilla UCI behavior, build/portability
      issues, etc. — belongs in the
      [upstream Stockfish issue tracker](https://github.com/official-stockfish/Stockfish/issues/new/choose).
      We do not patch search or evaluation code in this fork; non-fork
      issues filed here will be closed and redirected.

- type: checkboxes
  attributes:
    label: Confirm scope
    options:
      - label: This issue is specific to `evallegal` and/or `NetSelection`. It is not a general Stockfish bug.
        required: true

- type: dropdown
  attributes:
    label: Which extension
    options:
      - "`evallegal` UCI command"
      - "`NetSelection` UCI option"
      - Both / interaction between the two
  validations:
    required: true

- type: textarea
  attributes:
    label: Describe the issue
    description: What you observed vs. what you expected from the extension.
  validations:
    required: true

- type: textarea
  attributes:
    label: Steps to reproduce
    description: |
      A minimal UCI session that demonstrates the bug. Include the
      `position` line, the relevant `setoption` / `evallegal` commands,
      and the full output.
    placeholder: |
      ```
      uci
      setoption name NetSelection value large
      position startpos moves e2e4 e7e5
      evallegal
      ```
  validations:
    required: true

- type: input
  attributes:
    label: Fork version / commit
    description: Tag (e.g. `sf18-v0.2.0`) or commit SHA of the build you're running.
    placeholder: sf18-v0.2.0 / 777b8807
  validations:
    required: true

- type: dropdown
  attributes:
    label: Operating system
    options:
      - Linux
      - MacOS
      - Windows
      - Other or N/A
  validations:
    required: true

- type: textarea
  attributes:
    label: Anything else?
    description: Additional context, hypotheses, or proposed fixes.
  validations:
    required: false
